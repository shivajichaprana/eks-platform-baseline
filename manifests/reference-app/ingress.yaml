# ALB Ingress for the reference application.
#
# Relies on infrastructure provisioned earlier in this repo:
#   * AWS Load Balancer Controller       (Day 39)
#   * cert-manager + Route 53 DNS-01     (Day 39)
#   * ExternalDNS                        (Day 39)
#
# The host annotation triggers an ExternalDNS A/AAAA record. cert-manager
# issues a Let's Encrypt cert; the ALB serves it on 443. Plain HTTP is
# redirected to HTTPS by the actions.ssl-redirect rule.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reference-app
  namespace: reference-app
  labels:
    app.kubernetes.io/name: reference-app
    app.kubernetes.io/part-of: eks-platform-baseline
  annotations:
    # ALB Controller core
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/load-balancer-name: reference-app
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/target-group-attributes: deregistration_delay.timeout_seconds=15
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=60,routing.http.drop_invalid_header_fields.enabled=true
    alb.ingress.kubernetes.io/tags: Project=eks-platform-baseline,Component=reference-app
    # cert-manager will request a Let's Encrypt cert and ALB Controller
    # imports it automatically via the Ingress TLS section.
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # ExternalDNS picks up rules[].host below.
    external-dns.alpha.kubernetes.io/hostname: reference.example.com
spec:
  ingressClassName: alb
  tls:
    - hosts:
        - reference.example.com
      secretName: reference-app-tls
  rules:
    - host: reference.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reference-app
                port:
                  name: http
