###############################################################################
# cert-manager ClusterIssuers — Let's Encrypt prod + staging.
#
# Two ClusterIssuers are defined so callers can pin to either:
#
#   * letsencrypt-staging  — Use during initial setup or when iterating on
#                            DNS / IAM. The staging CA returns certificates
#                            from the Fake LE Intermediate; browsers will
#                            mark them as untrusted, but the rate limit is
#                            far higher (50,000/week vs prod's 50/week).
#   * letsencrypt-prod     — Use when staging issuance succeeds end-to-end.
#                            Returns trusted certificates from R3.
#
# Both issuers use the AWS Route 53 DNS-01 solver. cert-manager picks the
# matching solver by `dnsZones` selector — first-match wins, so the wildcard
# `dnsZones: ["*"]` is a safe default unless multi-tenancy is required.
#
# Apply ORDER:
#   1. `terraform apply` for the cert-manager module (provisions IRSA + Helm).
#   2. `kubectl apply -f manifests/cert-manager/cluster-issuer.yaml`.
#   3. Optionally, `kubectl apply -f manifests/examples/ingress-example.yaml`
#      to verify end-to-end issuance.
#
# IMPORTANT — replace the four placeholders below before applying:
#   * <ACME_EMAIL>          email used for LE registration + expiry alerts
#   * <AWS_REGION>          region of the hosted zones (e.g. us-east-1)
#   * <HOSTED_ZONE_ID>      Z-prefixed Route 53 hosted-zone ID
#   * <ALLOWED_DNS_SUFFIX>  zone apex covered by this issuer (e.g. example.com)
###############################################################################

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/component: cert-manager-issuer
    app.kubernetes.io/part-of: eks-platform-baseline
    issuer-tier: staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: <ACME_EMAIL>

    # cert-manager records the ACME account private key here. The Secret is
    # auto-created on first ClusterIssuer reconcile.
    privateKeySecretRef:
      name: letsencrypt-staging-account-key

    solvers:
      # Match-all solver: this issuer can solve a challenge for any DNS name
      # under <ALLOWED_DNS_SUFFIX>. Add additional `selector.dnsZones`
      # blocks if you want to fence off subdomains to different solvers.
      - selector:
          dnsZones:
            - <ALLOWED_DNS_SUFFIX>
        dns01:
          route53:
            region: <AWS_REGION>
            hostedZoneID: <HOSTED_ZONE_ID>

---

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/component: cert-manager-issuer
    app.kubernetes.io/part-of: eks-platform-baseline
    issuer-tier: production
  annotations:
    # If the issuer fails, surface the reason in `kubectl describe
    # certificate` rather than silently retrying forever.
    cert-manager.io/disable-auto-renewal: "false"
spec:
  acme:
    # Let's Encrypt production directory. Rate-limited:
    #   * 50 certs / registered domain / week
    #   * 5 duplicate certs / week
    # If you hit the rate limit, switch the Certificate / Ingress
    # `cert-manager.io/cluster-issuer` annotation back to
    # `letsencrypt-staging` while you debug.
    server: https://acme-v02.api.letsencrypt.org/directory
    email: <ACME_EMAIL>

    privateKeySecretRef:
      name: letsencrypt-prod-account-key

    solvers:
      - selector:
          dnsZones:
            - <ALLOWED_DNS_SUFFIX>
        dns01:
          route53:
            region: <AWS_REGION>
            hostedZoneID: <HOSTED_ZONE_ID>
