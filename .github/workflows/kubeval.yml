# Kubernetes manifest validation for eks-platform-baseline.
#
# Runs kubeconform (the maintained successor to kubeval) against every YAML
# file under manifests/. Uses an OpenAPI schema set that includes CRDs for
# cert-manager, ALB Controller, ExternalDNS, Karpenter, etc., so resources
# like ClusterIssuer / NodePool don't trip "schema not found".
name: kubeval

on:
  push:
    branches: [main]
    paths:
      - "manifests/**"
      - ".github/workflows/kubeval.yml"
  pull_request:
    branches: [main]
    paths:
      - "manifests/**"
      - ".github/workflows/kubeval.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  KUBE_VERSION: "1.30.0"
  KUBECONFORM_VERSION: "v0.6.7"

concurrency:
  group: kubeval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----- 1. yamllint ------------------------------------------------------
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1
        with:
          file_or_dir: manifests
          config_file: .yamllint.yml
          strict: true

  # ----- 2. kubeconform (replaces unmaintained kubeval) -------------------
  kubeconform:
    name: kubeconform
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -sSLo /tmp/kc.tgz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kc.tgz -C /tmp kubeconform
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Run kubeconform
        run: |
          set -euo pipefail
          # Schema sources, in fall-through order:
          #   1. Stock Kubernetes 1.30 schemas
          #   2. Datreeio CRD set (cert-manager, ALB Ctrl, ExternalDNS, Karpenter)
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -kubernetes-version "${KUBE_VERSION}" \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary \
            -output text \
            manifests/

  # ----- 3. kustomize build -----------------------------------------------
  kustomize-build:
    name: kustomize build
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Install kustomize
        uses: imranismail/setup-kustomize@2ac87021339cf4dc83d9520d1d18a386e87f7c66 # v2
        with:
          kustomize-version: "5.4.3"

      - name: Build every kustomization
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' kfile; do
            d="$(dirname "$kfile")"
            echo "::group::kustomize build $d"
            if kustomize build "$d" > /dev/null; then
              echo "ok: $d"
            else
              echo "::error file=$kfile::kustomize build failed in $d"
              fail=1
            fi
            echo "::endgroup::"
          done < <(find manifests -name kustomization.yaml -print0)
          exit "$fail"

  # ----- 4. polaris best-practices ----------------------------------------
  polaris:
    name: polaris
    runs-on: ubuntu-latest
    needs: kubeconform
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Install polaris
        run: |
          set -euo pipefail
          curl -sSLo /tmp/polaris.tgz \
            "https://github.com/FairwindsOps/polaris/releases/download/9.6.0/polaris_linux_amd64.tar.gz"
          tar -xzf /tmp/polaris.tgz -C /tmp polaris
          sudo install -m 0755 /tmp/polaris /usr/local/bin/polaris
          polaris version

      - name: Audit manifests
        run: |
          set -euo pipefail
          polaris audit \
            --audit-path manifests \
            --format pretty \
            --severity warning \
            --set-exit-code-on-danger \
            --set-exit-code-below-score 80
