# yamllint config tuned for Kubernetes manifests.
extends: default

rules:
  line-length:
    max: 200
    level: warning
  indentation:
    spaces: 2
    indent-sequences: consistent
  comments:
    require-starting-space: true
    min-spaces-from-content: 1
  comments-indentation: disable
  truthy:
    allowed-values: ["true", "false"]
    check-keys: false
  document-start:
    present: true
  empty-lines:
    max: 2
    max-start: 0
    max-end: 1

ignore: |
  helm-values/
